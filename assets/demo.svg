  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="380" y="23" fill="#8b949e" font-size="12" text-anchor="middle">ios-ship-doctor — preflight</text>

  <g font-size="13">
    <text x="20" y="66" fill="#58a6ff">$ </text><text x="34" y="66" fill="#c9d1d9">claude "is my app ready to submit?"</text>

    <text x="20" y="98" fill="#8b949e">🩺 Ship Doctor preflight — ~/Desktop/MyApp</text>
    <text x="20" y="122" fill="#f85149" font-weight="bold">VERDICT: NOT READY — 1 blocking issue will fail review.</text>
