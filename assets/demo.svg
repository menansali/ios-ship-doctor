    <text x="20" y="400" fill="#58a6ff">$ </text><text x="34" y="400" fill="#c9d1d9">claude "fix what you can"  </text><text x="250" y="400" fill="#3fb950">→ autofix applied 2 fixes ✓</text>
    <text x="20" y="420" fill="#c9d1d9" opacity="0.6">▋</text>
